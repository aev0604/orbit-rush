<body>

function играть(f,d,t="square",v=0.3,dl=0){if(!звукВкл)return;try{const ac=getAudio(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type=t;o.frequency.setValueAtTime(f,ac.currentTime+dl);g.gain.setValueAtTime(v,ac.currentTime+dl);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dl+d);o.start(ac.currentTime+dl);o.stop(ac.currentTime+dl+d)}catch(e){}}

function рисАстероид(а){ctx.save();ctx.translate(а.x,а.y);ctx.rotate(а.угол);ctx.beginPath();for(let i=0;i<8;i++){const у=(i/8)*Math.PI*2,р=а.радиус*(0.75+Math.sin(i*2.3+а.угол)*0.25);i===0?ctx.moveTo(Math.cos(у)*р,Math.sin(у)*р):ctx.lineTo(Math.cos(у)*р,Math.sin(у)*р)};ctx.closePath();glow(активноеЗамедление?"#8844ff":"#ff4400",12);ctx.fillStyle=активноеЗамедление?"#442288":"#aa3300";ctx.fill();ctx.strokeStyle=активноеЗамедление?"#aa66ff":"#ff6622";ctx.lineWidth=2;ctx.stroke();noGlow();ctx.restore()}
function рисОнбординг(){ctx.fillStyle="rgba(6,6,15,0.92)";ctx.fillRect(0,0,400,500);glow("#00d4aa",25);ctx.textAlign="center";ctx.fillStyle="#00d4aa";ctx.font="bold 32px Arial";ctx.fillText("ORBIT RUSH",200,95);noGlow();ctx.fillStyle="#555";ctx.font="13px Arial";ctx.fillText("🚀 Rush through the cosmos",200,120);const шаги=[{иконка:"☄️ 🛸 🪨",заголовок:т.подсказка1,описание:"+10 points each",цвет:"#00d4aa"},{иконка:"🔴",заголовок:т.подсказка2,описание:"−1 ❤️ per hit • 3 lives",цвет:"#ff4444"},{иконка:"🛡️ 🧲 ⏱️",заголовок:т.подсказка3,описание:"Shield • Magnet • Slow-Mo",цвет:"#ffcc00"}];const ш=шаги[онбординг.шаг];онбординг.таймер++;ctx.strokeStyle=ш.цвет+"55";ctx.lineWidth=1.5;glow(ш.цвет,12);ctx.beginPath();ctx.roundRect(50,148,300,195,12);ctx.stroke();noGlow();ctx.font="36px Arial";ctx.fillText(ш.иконка,200,215);glow(ш.цвет,10);ctx.fillStyle=ш.цвет;ctx.font="bold 17px Arial";ctx.fillText(ш.заголовок,200,256);noGlow();ctx.fillStyle="#666";ctx.font="13px Arial";ctx.fillText(ш.описание,200,280);for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(188+i*12,310,4,0,Math.PI*2);ctx.fillStyle=i===онбординг.шаг?ш.цвет:"#2a2a3a";ctx.fill()};if(Math.sin(онбординг.таймер*0.08)>0){glow(ш.цвет,12);ctx.fillStyle=ш.цвет+"22";ctx.strokeStyle=ш.цвет;ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(140,362,120,38,8);ctx.fill();ctx.stroke();ctx.fillStyle=ш.цвет;ctx.font="bold 14px Arial";ctx.fillText(онбординг.шаг<2?"Next →":т.старт,200,386);noGlow()};if(онбординг.шаг===0){ctx.fillStyle="#2a2a3a";ctx.font="12px Arial";ctx.fillText("← → keys or touch to move",200,432)}}
