<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Orbit Rush — collect space debris, dodge asteroids, catch power-ups!">
  <title>Orbit Rush</title>
  <style>
    #nameOverlay {
      position: fixed; inset: 0; background: rgba(6,6,15,0.96);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; font-family: Arial, sans-serif;
    }
    #nameBox {
      background: #0d0d1f; border: 1px solid #00d4aa44;
      border-radius: 16px; padding: 32px 28px; text-align: center;
      box-shadow: 0 0 40px #00d4aa22; max-width: 300px; width: 90%;
    }
    #nameBox h2 { color: #00d4aa; font-size: 22px; margin-bottom: 6px; }
    #nameBox p { color: #888; font-size: 13px; margin-bottom: 20px; }
    #nameInput {
      width: 100%; padding: 12px 16px; border-radius: 10px;
      border: 1px solid #00d4aa55; background: #06060f;
      color: #fff; font-size: 16px; text-align: center;
      outline: none; margin-bottom: 16px; box-sizing: border-box;
    }
    #nameInput:focus { border-color: #00d4aa; box-shadow: 0 0 12px #00d4aa33; }
    #nameBtn {
      width: 100%; padding: 13px; border-radius: 10px;
      background: #00d4aa; color: #06060f; font-size: 16px;
      font-weight: bold; border: none; cursor: pointer;
    }
    #nameBtn:hover { background: #00ffcc; }
    body {
      background: #06060f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      touch-action: none;
      overflow: hidden;
    }
    canvas { border-radius: 12px; display: block; max-width: 100vw; max-height: 90vh; box-shadow: 0 0 40px #00d4aa33, 0 0 80px #00d4aa11; }
    #canvasWrap { position: relative; display: inline-block; line-height: 0; }
    #shopBtnOverlay { position: absolute; bottom: 60px; left: 0; right: 0; display: none; justify-content: space-around; align-items: center; padding: 0 24px; box-sizing: border-box; z-index: 50; }
    #lvlShopBtn, #lvlContinueBtn { padding: 11px 24px; border-radius: 9px; font-size: 14px; font-weight: bold; cursor: pointer; font-family: Arial; background: rgba(0,0,0,0.7); }
    .controls {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 10px;
    }
    .hint { color: #333; font-size: 12px; }
    .hint span { color: #00d4aa; }
    .btn {
      background: #1a1a2e;
      border: 1px solid #00d4aa44;
      border-radius: 8px;
      color: #00d4aa;
      font-size: 18px;
      padding: 6px 12px;
      cursor: pointer;
    }
    .btn.muted { color: #444; border-color: #333; }
    #shopBtn:hover { background: #ffcc0011 !important; }
    .skin-card { background:#0d0d1f; border-radius:10px; padding:12px 8px; text-align:center; cursor:pointer; border:1px solid #ffffff11; transition:border .2s; }
    .skin-card:hover { border-color: #ffffff33; }
    .skin-card.owned { border-color: #00d4aa55; }
    .skin-card.equipped { border:2px solid #00d4aa; background:#00d4aa11; }
    .skin-card.locked { opacity:0.5; cursor:default; }
    .upgrade-card { background:#0d0d1f; border-radius:10px; padding:14px 16px; border:1px solid #ffffff11; display:flex; align-items:center; gap:12px; }
    .upgrade-card button { margin-left:auto; padding:7px 14px; border-radius:8px; border:none; font-size:13px; font-weight:bold; cursor:pointer; white-space:nowrap; }
  </style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, set, query, orderByChild, limitToLast, get, equalTo } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA7kbZZuKbv_Vsv6ZcSvMu6GiGZC6h9a_k",
      authDomain: "orbit-rush-bf307.firebaseapp.com",
      databaseURL: "https://orbit-rush-bf307-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "orbit-rush-bf307",
      storageBucket: "orbit-rush-bf307.firebasestorage.app",
      messagingSenderId: "806308749745",
      appId: "1:806308749745:web:9583dbb02fcadbd6e25d90"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Сохраняем только лучший результат на имя — один игрок = одна запись
    window.сохранитьГлобальныйРезультат = async function(очки, имя) {
      const finalName = (имя || localStorage.getItem("orbitRushName") || "Anonymous").trim()
      if (!finalName || finalName === "Player") return
      try {
        // Ищем существующую запись этого игрока
        const q = query(ref(db, 'leaderboard'), orderByChild('name'), equalTo(finalName))
        const snap = await get(q)
        if (snap.exists()) {
          // Обновляем только если новый результат выше
          let лучшийКлюч = null, лучшийРезультат = 0
          snap.forEach(child => {
            if (child.val().score >= лучшийРезультат) {
              лучшийРезультат = child.val().score
              лучшийКлюч = child.key
            }
          })
          if (очки > лучшийРезультат && лучшийКлюч) {
            await set(ref(db, `leaderboard/${лучшийКлюч}`), { score: Math.round(очки), name: finalName, ts: Date.now() })
          }
        } else {
          // Новый игрок — создаём запись
          await push(ref(db, 'leaderboard'), { score: Math.round(очки), name: finalName, ts: Date.now() })
        }
      } catch(e) {}
    };

    window.загрузитьГлобальныйТоп = async function() {
      try {
        const q = query(ref(db, 'leaderboard'), orderByChild('score'), limitToLast(20))
        const snap = await get(q)
        const результаты = []
        snap.forEach(child => {
          const val = child.val()
          if (val.name && val.name !== "Player") {
            результаты.push({ score: val.score, name: val.name })
          }
        })
        const уникальные = {}
        результаты.forEach(r => {
          if (!уникальные[r.name] || r.score > уникальные[r.name].score) уникальные[r.name] = r
        })
        return Object.values(уникальные).sort((a,b) => b.score - a.score).slice(0, 5)
      } catch(e) { return [] }
    };

    // Загружаем личный рекорд игрока из Firebase при старте
    window.загрузитьЛичныйРекорд = async function(имя) {
      if (!имя || имя === "Player") return 0
      try {
        const q = query(ref(db, 'leaderboard'), orderByChild('name'), equalTo(имя))
        const snap = await get(q)
        let лучший = 0
        snap.forEach(child => { if (child.val().score > лучший) лучший = child.val().score })
        return лучший
      } catch(e) { return 0 }
    };
  </script>
</head>
<body>
  <div id="nameOverlay">
    <div id="nameBox">
      <h2>🚀 ORBIT RUSH</h2>

  <!-- МАГАЗИН -->
  <div id="shopOverlay" style="display:none;position:fixed;inset:0;background:rgba(6,6,15,0.97);z-index:200;font-family:Arial,sans-serif;overflow-y:auto;">
    <div style="max-width:360px;margin:0 auto;padding:20px 16px 40px;">

      <!-- СКИНЫ -->

      <!-- Превью корабля -->

        <div style="color:#555;font-size:11px;margin-bottom:6px;">PREVIEW</div>

      </div>

  <script>
    ;(function() {
      const overlay = document.getElementById("nameOverlay")
      const nameInput = document.getElementById("nameInput")
      const nameBtn = document.getElementById("nameBtn")
      const levelSelect = document.getElementById("levelSelect")
      const levelBtns = document.getElementById("levelBtns")
      const savedName = localStorage.getItem("orbitRushName")
      const maxLevel = parseInt(localStorage.getItem("orbitRushMaxLevel") || "1")
      const maxGalaxy = Math.ceil(maxLevel / 5)
      // По умолчанию — последняя разблокированная галактика
      let chosenLevel = (maxGalaxy - 1) * 5 + 1
      if (savedName && savedName.length > 0) nameInput.value = savedName

      // Показываем выбор галактик если открыто больше 1
      if (maxGalaxy > 1) {
        levelSelect.style.display = "block"
        const lbl = document.getElementById("levelLabel")
        if (lbl) lbl.textContent = "🌌 Choose Galaxy:"

        const галЦвета = ["#00d4aa","#aa44ff","#ff6600","#ff0044","#ffcc00"]
        const галИконки = ["🌌","🌠","☄️","🔥","💀"]

        for (let i = 0; i < Math.min(maxGalaxy, 5); i++) {
          const startLvl = i * 5 + 1
          const btn = document.createElement("button")
          btn.textContent = `${галИконки[i]} G${i+1}`
          const цвет = галЦвета[i]
          const isSelected = startLvl === chosenLevel
          btn.style.cssText = `padding:7px 16px; border-radius:8px; border:1px solid ${цвет}88; background:${isSelected ? цвет+"33" : "transparent"}; color:${цвет}; cursor:pointer; font-size:13px; font-weight:${isSelected?"bold":"normal"};`
          btn.addEventListener("click", () => {
            chosenLevel = startLvl
            document.querySelectorAll("#levelBtns button").forEach((b, j) => {
              const c = галЦвета[j]
              b.style.background = "transparent"; b.style.fontWeight = "normal"; b.style.border = `1px solid ${c}88`
            })
            btn.style.background = цвет + "33"; btn.style.fontWeight = "bold"; btn.style.border = `1.5px solid ${цвет}`
          })
          levelBtns.appendChild(btn)
        }
      }

      function startGame() {
        const name = nameInput.value.trim()
        if (!name) { nameInput.style.borderColor = "#ff4444"; return }
        localStorage.setItem("orbitRushName", name)
        window._playerName = name
        window._startLevel = chosenLevel

        // Показываем "Loading..." пока Firebase не ответил
        nameBtn.textContent = "⏳ Loading..."
        nameBtn.disabled = true

        const запустить = () => {
          overlay.style.display = "none"
          nameBtn.textContent = "▶ PLAY"
          nameBtn.disabled = false
        }

        if (window.загрузитьЛичныйРекорд) {
          // Таймаут 3 сек — если Firebase не ответил, запускаем всё равно
          const таймаут = setTimeout(запустить, 3000)
          window.загрузитьЛичныйРекорд(name).then(лучший => {
            clearTimeout(таймаут)
            if (лучший > 0) {
              const текущий = parseInt(localStorage.getItem("orbitRushRecord") || "0")
              if (лучший > текущий) localStorage.setItem("orbitRushRecord", String(лучший))
            }
            запустить()
          }).catch(() => { clearTimeout(таймаут); запустить() })
        } else {
          запустить()
        }
      }
      nameBtn.addEventListener("click", startGame)
      nameInput.addEventListener("keydown", e => { if (e.key === "Enter") startGame() })
      nameInput.addEventListener("input", () => { nameInput.style.borderColor = "#00d4aa55" })
    })()
  </script>
  <script>
  // =====================
  // 🏪 МАГАЗИН
  // =====================
  const СКИНЫ = [
    { id:"default",  иконка:"🚀", название:"Default",  цена:0,    цвет:"#00d4aa", двигатель:"#ff8800", описание:"Classic" },
    { id:"phoenix",  иконка:"🔥", название:"Phoenix",  цена:200,  цвет:"#ff6600", двигатель:"#ff0000", описание:"+fire trail" },
    { id:"frost",    иконка:"❄️", название:"Frost",    цена:300,  цвет:"#00ccff", двигатель:"#ffffff", описание:"+ice trail" },
    { id:"thunder",  иконка:"⚡", название:"Thunder",  цена:400,  цвет:"#ffff00", двигатель:"#aa00ff", описание:"+lightning" },
    { id:"alien",    иконка:"👾", название:"Alien",    цена:500,  цвет:"#00ff88", двигатель:"#ff00ff", описание:"+alien glow" },
    { id:"diamond",  иконка:"💎", название:"Diamond",  цена:800,  цвет:"#aaddff", двигатель:"#ffffff", описание:"Prestige" },
    { id:"rainbow",  иконка:"🌈", название:"Rainbow",  цена:1000, цвет:"#ff44aa", двигатель:"#ffcc00", описание:"Ultra rare" },
  ]
  const АПГРЕЙДЫ = [
    // Постоянные
    { id:"rapidfire", иконка:"🔫", название:"Rapid Fire",  макс:3, тип:"постоянный", ценыУровней:[150,300,500], описания:["Shoot faster +20%","Shoot faster +40%","Shoot faster +60%"] },
    { id:"magnet",    иконка:"🧲", название:"Magnet",       макс:3, тип:"постоянный", ценыУровней:[150,300,450], описания:["Collect range +30%","Collect range +60%","Collect range x2"] },
    { id:"radar",     иконка:"📡", название:"Radar",        макс:1, тип:"постоянный", ценыУровней:[500],         описания:["⚠️ warns before enemies appear"] },
    { id:"autoaim",   иконка:"🎯", название:"Auto Aim",     макс:1, тип:"постоянный", ценыУровней:[500],         описания:["Bullets track nearest enemy"] },
    // Галактические
    { id:"extralife", иконка:"❤️", название:"Extra Life",  макс:1, тип:"галактика",  ценыУровней:[300],         описания:["+1 life on start (resets per galaxy)"] },
    // Расходники
    { id:"megabomb",  иконка:"💣", название:"Mega Bomb",    макс:1, тип:"расходник",  ценыУровней:[200],         описания:["Clears screen once • 2×TAP or B"] },
    { id:"slowstart", иконка:"🐢", название:"Slow Start",   макс:1, тип:"расходник",  ценыУровней:[150],         описания:["Speed -30% for first 60 seconds"] },
  ]
  function сохранитьМагазин(д) { localStorage.setItem("orbitRushShop", JSON.stringify(д)) }
  function загрузитьМагазин() { try { return JSON.parse(localStorage.getItem("orbitRushShop") || "{}") } catch { return {} } }

  window.открытьМагазин = function() {
    const д = загрузитьМагазин()
    const монеты = parseInt(localStorage.getItem("orbitRushCoins") || "0")
    const equipped = д.skin || "default"
    document.getElementById("shopCoins").textContent = `💰 ${монеты}`
    document.getElementById("shopOverlay").style.display = "block"
    // --- Скины ---
    const grid = document.getElementById("skinGrid"); grid.innerHTML = ""
    СКИНЫ.forEach(с => {
      const owned = с.цена === 0 || д["skin_"+с.id]
      const isEquipped = equipped === с.id
      const canBuy = монеты >= с.цена && !owned
      const card = document.createElement("div")
      card.className = "skin-card"+(isEquipped?" equipped":"")+(owned&&!isEquipped?" owned":"")+((!owned&&!canBuy)?" locked":"")
      const cvId = `ship_prev_${с.id}`
      card.innerHTML = `
        <canvas id="${cvId}" width="70" height="70" style="border-radius:8px;background:#06060f;display:block;margin:0 auto 4px;"></canvas>
        <div style="color:#fff;font-size:12px;font-weight:bold;margin:2px 0">${с.название}</div>
        <div style="color:#666;font-size:10px;margin-bottom:6px">${с.описание}</div>
        ${isEquipped
          ? `<div style="color:#00d4aa;font-size:11px;font-weight:bold">✓ EQUIPPED</div>`
          : owned
            ? `<button onclick="window.экипироватьСкин('${с.id}')" style="width:100%;padding:5px;border-radius:6px;background:#00d4aa22;border:1px solid #00d4aa55;color:#00d4aa;font-size:11px;cursor:pointer">EQUIP</button>`
            : `<div style="color:${canBuy?'#ffd700':'#555'};font-size:12px;font-weight:bold">💰 ${с.цена}</div>
               ${canBuy?`<button onclick="window.купитьСкин('${с.id}')" style="width:100%;padding:5px;border-radius:6px;background:#ffcc0022;border:1px solid #ffcc0055;color:#ffcc00;font-size:11px;cursor:pointer;margin-top:4px">BUY</button>`:'<div style="color:#333;font-size:10px">Need more 💰</div>'}`
        }`
      card.addEventListener("click", ()=>рисПревью(с.цвет,с.двигатель))
      grid.appendChild(card)
      requestAnimationFrame(() => рисКорабльВКарточке(cvId, с.id, с.цвет, с.двигатель))
    })
    // --- Апгрейды ---
    const list = document.getElementById("upgradeList"); list.innerHTML = ""
    const текГал = parseInt(localStorage.getItem("orbitRushMaxGalaxy") || "1")
    const типЦвета = { постоянный:"#00d4aa", галактика:"#aa44ff", расходник:"#ff8800" }
    const типНазвания = { постоянный:"PERMANENT", галактика:"PER GALAXY", расходник:"PER GAME" }
    let текТип = ""
    АПГРЕЙДЫ.forEach(а => {
      if (а.тип !== текТип) {
        текТип = а.тип
        const заг = document.createElement("div")
        заг.style.cssText = `color:${типЦвета[а.тип]};font-size:10px;font-weight:bold;letter-spacing:1px;margin:12px 0 4px;opacity:0.7`
        заг.textContent = `— ${типНазвания[а.тип]} —`
        list.appendChild(заг)
      }
      const ключ = а.тип==="галактика" ? `upg_${а.id}_g${текГал}` :
                   а.тип==="расходник" ? `upg_${а.id}_game` : `upg_${а.id}`
      const lv = д[ключ] || 0; const maxed = lv >= а.макс
      const цена = а.ценыУровней[lv] || 0; const canBuy = !maxed && монеты >= цена
      const цвет = типЦвета[а.тип]
      const статус = maxed ? (а.тип==="расходник"?"✓ READY":а.тип==="галактика"?`✓ Galaxy ${текГал}`:"✓ MAX") : а.описания[lv]
      const card = document.createElement("div"); card.className = "upgrade-card"
      card.innerHTML = `<div style="font-size:24px">${а.иконка}</div>
        <div style="flex:1">
          <div style="color:#fff;font-size:13px;font-weight:bold">${а.название}</div>
          <div style="color:#888;font-size:11px;margin:2px 0">${статус}</div>
          <div style="display:flex;gap:4px;margin-top:4px">
            ${Array.from({length:а.макс},(_,i)=>`<div style="width:18px;height:4px;border-radius:2px;background:${i<lv?цвет:'#222'}"></div>`).join("")}
          </div>
        </div>
        ${maxed
          ? `<button disabled style="background:#222;color:#555;border:none;border-radius:8px;padding:7px 14px;font-size:12px">${а.тип==="расходник"?"READY":"MAX"}</button>`
          : `<button onclick="window.купитьАпгрейд('${а.id}')" style="background:${canBuy?цвет+'22':'#111'};border:1px solid ${canBuy?цвет+'55':'#333'};color:${canBuy?цвет:'#444'};border-radius:8px;padding:7px 14px;font-size:12px;cursor:${canBuy?'pointer':'default'}">💰 ${цена}</button>`
        }`
      list.appendChild(card)
    })
    const тС = СКИНЫ.find(с=>с.id===equipped)||СКИНЫ[0]; рисПревью(тС.цвет,тС.двигатель)
  }

  window.рисКорабльВКарточке = function(cvId, скинИд, корЦвет, двЦвет) {
    const cv = document.getElementById(cvId); if (!cv) return
    const c = cv.getContext("2d"); c.clearRect(0,0,70,70)
    c.fillStyle="#06060f"; c.fillRect(0,0,70,70)
    const x=35, y=40
    function glow(ц,б){c.shadowColor=ц;c.shadowBlur=б} function noGlow(){c.shadowBlur=0}

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
  return audioCtx
}
function переключитьЗвук() {
  звукВкл = !звукВкл

  document.getElementById("звукКнопка").classList.toggle("muted", !звукВкл)
}
function играть(f, d, t = "square", v = 0.3, dl = 0) {
  if (!звукВкл) return
  try {
    const ac = getAudio(), o = ac.createOscillator(), g = ac.createGain()
    o.connect(g); g.connect(ac.destination); o.type = t
    o.frequency.setValueAtTime(f, ac.currentTime + dl)
    g.gain.setValueAtTime(v, ac.currentTime + dl)
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dl + d)
    o.start(ac.currentTime + dl); o.stop(ac.currentTime + dl + d)
  } catch (e) {}
}

function рисКорабль(x, y, миг) {

  const СКИН_ЦВЕТА = {
    default:  { к:"", д:"" },
    phoenix:  { к:"#ff6600", д:"#ff0000" },
    frost:    { к:"#00ccff", д:"#ffffff" },
    thunder:  { к:"#ffff00", д:"#aa00ff" },
    alien:    { к:"#00ff88", д:"#ff00ff" },
    diamond:  { к:"#aaddff", д:"#ffffff" },
    rainbow:  { к:"#ff44aa", д:"#ffcc00" },
  }
  const скинИд = window._activeSkin || "default"
  const скинЦвет = СКИН_ЦВЕТА[скинИд] || СКИН_ЦВЕТА.default
  const корЦвет = скинЦвет.к || нУ.корабльЦвет
  const двЦвет  = скинЦвет.д || нУ.двигательЦвет
  ctx.save()
  if (активныйЩит) {
    glow("#4488ff", 20)
    ctx.strokeStyle = `rgba(68,136,255,${0.5+Math.sin(кадр*0.1)*0.3})`
    ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(x, y, 28, 0, Math.PI*2); ctx.stroke(); noGlow()
  }
  if (активныйМагнит) {
    ctx.strokeStyle = "rgba(255,68,170,0.25)"; ctx.lineWidth = 1
    for (const м of мусорСписок.slice(0,3)) { ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(м.x,м.y); ctx.stroke() }
  }
  const дЦвет = двЦвет

  // =====================
  // ✨ УНИКАЛЬНЫЕ ЭФФЕКТЫ СКИНОВ
  // =====================
  const t = кадр // для анимации

  if (скинИд === "default") {
    // Обычный след
    const f = Math.random()*10+10
    const г = ctx.createLinearGradient(x, y+20, x, y+30+f)
    г.addColorStop(0, дЦвет); г.addColorStop(1,"transparent")
    glow(дЦвет, 20); ctx.fillStyle = г
    ctx.beginPath(); ctx.ellipse(x,y+23,7,f,0,0,Math.PI*2); ctx.fill()

  } else if (скинИд === "phoenix") {
    // 🔥 Огненный след — широкий, мерцающий, три языка пламени
    for (let i = -1; i <= 1; i++) {
      const f = Math.random()*18+14
      const мерц = 0.6 + Math.sin(t*0.3+i)*0.4
      const г = ctx.createLinearGradient(x+i*5,y+18,x+i*3,y+34+f)
      г.addColorStop(0,"#ffff00"); г.addColorStop(0.4,дЦвет); г.addColorStop(1,"transparent")
      ctx.globalAlpha = мерц; glow(дЦвет, 30)
      ctx.fillStyle = г; ctx.beginPath(); ctx.ellipse(x+i*7,y+24,5+Math.abs(i)*2,f,0,0,Math.PI*2); ctx.fill()
    }
    ctx.globalAlpha = 1

  } else if (скинИд === "frost") {
    // ❄️ Ледяной след — широкий, кристальный, снежинки
    const f = 20 + Math.sin(t*0.05)*5
    const г = ctx.createLinearGradient(x,y+18,x,y+42+f)
    г.addColorStop(0,"#ffffff"); г.addColorStop(0.3,дЦвет); г.addColorStop(1,"transparent")
    glow(дЦвет, 25); ctx.fillStyle = г
    ctx.beginPath(); ctx.ellipse(x,y+26,10,f,0,0,Math.PI*2); ctx.fill()
    // Снежинки по бокам
    for (let i = 0; i < 3; i++) {
      const sx = x + Math.sin(t*0.15+i*2)*18
      const sy = y + 20 + i*12

function игровойЦикл() {
  кадр++
  const нУ = настройкиУровня(уровень)
  ctx.fillStyle = нУ.фон; ctx.fillRect(0,0,400,500)

  // Звёзды
  for (const з of звёзды) {
    const яр = 0.4 + Math.sin(кадр*0.05+з.яркость*10)*0.3
    ctx.globalAlpha = яр; ctx.fillStyle = нУ.звёздыЦвет
    ctx.beginPath(); ctx.arc(з.x,з.y,з.размер,0,Math.PI*2); ctx.fill()
    ctx.globalAlpha = 1
    if (состояние === "игра") з.y += з.скорость
    if (з.y > 500) { з.y = 0; з.x = Math.random()*400 }
  }

  if (состояние === "онбординг") { рисОнбординг(); requestAnimationFrame(игровойЦикл); return }

  if (состояние === "победа") { рисПобеды(); requestAnimationFrame(игровойЦикл); return }

  if (состояние === "переходУровня") {
    if (таймерПереходаУровня > 0) таймерПереходаУровня--
    рисПереходУровня()
    // НЕ запускаем игру автоматически — ждём нажатия кнопки CONTINUE
    requestAnimationFrame(игровойЦикл); return
  }

  if (состояние === "игра") {
    таймерУскорения++
    // Очки за выживание (каждые 60 кадров = ~1 сек, только с галактики 2)
    if (очкиМнож() > 1) {
      таймерВыживания++
      if (таймерВыживания >= 60) {
        таймерВыживания = 0
        const б = Math.round(очкиМнож() - 1)  // G2=+1, G3=+2 и т.д.
        счёт += б
        добЭффект(корабль.x, корабль.y - 35, `+${б} ⏱`, "#aaaaff")
      }
    }
    if (таймерУскорения >= 600) {
      скоростьМусора += 0.3; таймерУскорения = 0
      const у = Math.floor((скоростьМусора-2)/0.4)+1
      if (у > предыдущийУровень) { звук.уровень(); предыдущийУровень = у; добЭффект(200, 250, `LEVEL ${у} 🚀`, "#ffcc00") }
    }
    // Система уровней по очкам
    if (счёт >= очкиДоСледующегоУровня && состояние === "игра") {
      уровень++
      // Каждые 5 уровней — новая галактика!
      if (уровень % 5 === 1 && уровень > 5) {

        }

    if (кадр % 600 === 0) создатьЧёрнуюДыру()

        }

        // Мгновенная гибель!
        взрыв(корабль.x, корабль.y, "#9900ff", 30)
        добЭффект(корабль.x, корабль.y-30, "BLACK HOLE!", "#9900ff")
        звук.смерть(); вибрация([200,50,200])
        жизни = 0
        if (счёт > getРекорд()) { setРекорд(счёт); новыйРекордФлаг=true; конфеттиЗапуск(); звук.рекорд() }
        рейтингТекущий = []
        состояние = "конец"
        смертьМаксУровень = Math.min(уровень, максДостигнутыйУровень)
        смертьВыбранныйУровень = Math.floor((смертьМаксУровень-1)/5)*5+1
        const _имя = имяИгрока()
        if (window.сохранитьГлобальныйРезультат && window.загрузитьГлобальныйТоп) {
          window.сохранитьГлобальныйРезультат(счёт, _имя).then(() => window.загрузитьГлобальныйТоп()).then(топ => { if(топ&&топ.length) рейтингТекущий=топ })
        }
        чёрныеДыры.splice(i, 1); break
      }
      // Притяжение мусора и пуль
      for (const м of мусорСписок) { const дx2=д.x-м.x,дy2=д.y-м.y,р2=Math.sqrt(дx2*дx2+дy2*дy2); if(р2<60){м.x+=дx2/р2*2;м.y+=дy2/р2*2} }
      if (д.y > 560) { чёрныеДыры.splice(i, 1); continue }
      рисЧёрнаяДыра(д)
    }

    // Босс
    if (босс) {
      босс.y = Math.min(100, босс.y + босс.скорость)
      // Движение по горизонтали
      босс.x += босс.dx
      if (босс.x > 360 || босс.x < 40) босс.dx *= -1
      // Столкновение с пулями
      for (let i = пули.length-1; i >= 0; i--) {
        const п = пули[i]
        const дx = п.x - босс.x, дy = п.y - босс.y
        if (Math.sqrt(дx*дx + дy*дy) < 44) {
          босс.hp--; пули.splice(i, 1)
          взрыв(босс.x + (Math.random()-0.5)*30, босс.y + (Math.random()-0.5)*30, "#ff4444", 12)
          добЭффект(босс.x, босс.y-50, `💥 ${босс.hp}/${босс.максHP}`, "#ff4466")
          звук.удар()
          if (босс.hp <= 0) {
            взрыв(босс.x, босс.y, "#ff0044", 40)
            добЭффект(босс.x, босс.y-40, "BOSS DOWN! +50 🎉", "#ffcc00")
            счёт += 50; звук.рекорд(); вибрация([100,50,100,50,200])
            if (разблокировать("bossKill")) { новоеДостижение = ДОСТИЖЕНИЯ_СПИСОК.bossKill; таймерДостижения = 180 }
            босс = null; break
          }
        }
      }
      // Столкновение с кораблём
      if (босс && таймерНеуязвимости === 0) {
        const дx = босс.x - корабль.x, дy = босс.y - корабль.y
        if (Math.sqrt(дx*дx + дy*дy) < 50) {
          if (активныйЩит) { активныйЩит=false; таймерЩита=0; взрыв(корабль.x,корабль.y,"#4488ff",20); добЭффект(корабль.x,корабль.y-25,"🛡️ BLOCK!","#4488ff"); звук.блок() }
          else { жизни--; таймерНеуязвимости=150; взрыв(корабль.x,корабль.y,"#ff4400"); добЭффект(корабль.x,корабль.y-25,"-1 ❤️","#ff4444"); звук.удар(); вибрация([80,30,80]) }
          if (жизни <= 0) {
            if (счёт > getРекорд()) { setРекорд(счёт); новыйРекордФлаг=true; конфеттиЗапуск(); звук.рекорд() }
            else звук.смерть()
            рейтингТекущий = []; смертьМаксУровень = Math.min(уровень, максДостигнутыйУровень); смертьВыбранныйУровень = Math.floor((смертьМаксУровень-1)/5)*5+1; состояние = "конец"
            const _имя = имяИгрока()
            if (window.сохранитьГлобальныйРезультат && window.загрузитьГлобальныйТоп) {
              window.сохранитьГлобальныйРезультат(счёт, _имя).then(() => window.загрузитьГлобальныйТоп()).then(топ => { if(топ&&топ.length) рейтингТекущий=топ })
            }
          }
        }
      }
      if (босс) рисБосс(босс)
    }
    for (let i = бонусы.length-1; i >= 0; i--) {
      const б = бонусы[i]; б.y += б.скорость; б.пульс++
      if (столк(б, 28)) { применитьБонус(б.тип,б.цвет); бонусы.splice(i,1); continue }
      if (б.y > 520) { бонусы.splice(i,1); continue }
      const ал = 0.4+Math.sin(б.пульс*0.15)*0.3
      ctx.globalAlpha=ал; glow(б.цвет,15); ctx.strokeStyle=б.цвет; ctx.lineWidth=2
      ctx.beginPath(); ctx.arc(б.x,б.y,20,0,Math.PI*2); ctx.stroke()
      noGlow(); ctx.globalAlpha=1; ctx.font="26px Arial"; ctx.textAlign="center"; ctx.fillText(б.иконка,б.x,б.y+9)
    }

    // 💰 Мешки с деньгами
    for (let i = мешкиДенег.length-1; i >= 0; i--) {
      const м = мешкиДенег[i]; м.y += м.скорость; м.пульс++
      if (столк(м, 24)) {
        добавитьМонеты(м.номинал)
        взрыв(м.x, м.y, м.цвет, 16)
        добЭффект(м.x, м.y-18, `+${м.номинал} 💰`, м.цвет)
        звук.сбор(); вибрация(30); мешкиДенег.splice(i, 1); continue
      }
      if (м.y > 520) { мешкиДенег.splice(i, 1); continue }
      // Рисуем мешок — иконка + номинал
      const bob = Math.sin(м.пульс * 0.1) * 3
      glow(м.цвет, 14)
      ctx.font = "24px Arial"; ctx.textAlign = "center"
      ctx.fillText("💰", м.x, м.y + bob)
      noGlow()
      // Номинал над мешком
      ctx.fillStyle = м.цвет; ctx.font = "bold 11px Arial"
      ctx.fillText(`+${м.номинал}`, м.x, м.y + bob - 16)
    }

    // Движение корабля
    if (касаниеАктивно) { const д=касаниеX-корабль.x; if(Math.abs(д)>3) корабль.x+=д*0.15 }
    else {
      if (корабль.движениеЛево  && корабль.x > 20)  корабль.x -= корабль.скорость
      if (корабль.движениеПраво && корабль.x < 380) корабль.x += корабль.скорость
    }
    корабль.x = Math.max(20, Math.min(380, корабль.x))
    рисКорабль(корабль.x, корабль.y, таймерНеуязвимости > 0)

    // Частицы
    for (let i = частицы.length-1; i >= 0; i--) {
      const ч=частицы[i]; ч.x+=ч.vx; ч.y+=ч.vy; ч.vy+=0.1; ч.жизнь--
      ctx.globalAlpha=ч.жизнь/ч.максЖизнь; glow(ч.цвет,8); ctx.fillStyle=ч.цвет
      ctx.beginPath(); ctx.arc(ч.x,ч.y,ч.радиус,0,Math.PI*2); ctx.fill()
      noGlow(); ctx.globalAlpha=1; if(ч.жизнь<=0) частицы.splice(i,1)
    }

    // Эффекты текста
    for (let i = эффекты.length-1; i >= 0; i--) {
      const э=эффекты[i]; ctx.globalAlpha=э.жизнь/50
      glow(э.цвет,10); ctx.fillStyle=э.цвет; ctx.font="bold 16px Arial"; ctx.textAlign="center"
      ctx.fillText(э.текст,э.x,э.y-(50-э.жизнь)*0.8); noGlow(); ctx.globalAlpha=1
      э.жизнь--; if(э.жизнь<=0) эффекты.splice(i,1)
    }
    рисHUD()
  }

  // Пауза
  if (состояние === "пауза") {
    for (const м of мусорСписок) { ctx.font=`${м.размер*2}px Arial`; ctx.textAlign="center"; ctx.fillText(м.иконка,м.x,м.y) }
    for (const а of астероиды) рисАстероид(а)
    рисКорабль(корабль.x, корабль.y, false)
    рисHUD(); рисПауза()
  }
  if (состояние === "игра" || состояние === "пауза") рисКнопкаПаузы()

  // Конфетти
  for (let i = конфетти.length-1; i >= 0; i--) {
    const к=конфетти[i]; к.x+=к.vx; к.y+=к.vy; к.угол+=к.вращение; к.жизнь--
    ctx.globalAlpha=Math.min(1,к.жизнь/30); ctx.save(); ctx.translate(к.x,к.y); ctx.rotate(к.угол)
    ctx.fillStyle=к.цвет; ctx.fillRect(-к.размер/2,-к.размер/4,к.размер,к.размер/2)
    ctx.restore(); ctx.globalAlpha=1; if(к.жизнь<=0||к.y>520) конфетти.splice(i,1)
  }

  // Game Over
  if (состояние === "конец") {
    ctx.fillStyle="rgba(6,6,15,0.94)"; ctx.fillRect(0,0,400,500); ctx.textAlign="center"

    // ── Строка 1: NEW RECORD или пусто (y=22)
    if (новыйРекордФлаг) {
      glow("#ffcc00",20); ctx.fillStyle="#ffcc00"; ctx.font="bold 14px Arial"
      ctx.fillText("🏆 " + т.новыйРекорд, 200, 22); noGlow()
    }

    // ── Строка 2: GAME OVER (y=52)
    glow("#ff4444",15); ctx.fillStyle="#ff4444"; ctx.font="bold 30px Arial"
    ctx.fillText(т.конец, 200, 52); noGlow()

    // ── Строка 3: Счёт (y=84)
    ctx.fillStyle="#ffffff"; ctx.font="bold 26px Arial"
    ctx.fillText(`${Math.round(счёт)}`, 200, 84)

    // ── Строка 4: Галактика и уровень (y=106)
    glow("#00d4aa",6); ctx.fillStyle="#00d4aa"; ctx.font="12px Arial"
    const гал = Math.floor((уровень-1)/5)+1, лвл = ((уровень-1)%5)+1
    ctx.fillText(`G${гал} Lvl${лвл} ⭐`, 200, 106); noGlow()

    // ── Разделитель
    ctx.strokeStyle="#ffffff0a"; ctx.lineWidth=1
    ctx.beginPath(); ctx.moveTo(40,116); ctx.lineTo(360,116); ctx.stroke()

    // ── Блок: GLOBAL TOP 5 (y=128..285)
    glow("#ffcc00",8); ctx.fillStyle="#ffcc00"; ctx.font="bold 12px Arial"
    ctx.fillText("🏆 GLOBAL TOP 5", 200, 132); noGlow()

    const топ = рейтингТекущий
    if (!топ.length) {
      ctx.fillStyle="#333"; ctx.font="12px Arial"
      ctx.fillText("Loading...", 200, 200)
    } else {
      const медали = ["🥇","🥈","🥉","4️⃣","5️⃣"]
      let отмеченМой = false
      топ.forEach((запись, i) => {
        const очки = typeof запись === "object" ? запись.score : запись
        const имяЗ = typeof запись === "object" ? (запись.name || "—") : "—"
        const этот = !отмеченМой && имяЗ === имяИгрока() && очки === Math.round(счёт)
        if (этот) отмеченМой = true
        const y = 152 + i*26
        if (этот) {
          ctx.fillStyle="rgba(0,212,170,0.12)"
          ctx.beginPath(); ctx.roundRect(44,y-17,312,22,5); ctx.fill()
        }
        ctx.font = этот ? "bold 13px Arial" : "12px Arial"
        // Медаль
        ctx.textAlign="center"; ctx.fillStyle = этот?"#00d4aa":"#666"
        ctx.fillText(медали[i], 64, y)
        // Имя
        ctx.textAlign="left"; ctx.fillStyle = этот?"#00d4aa":"#888"
        ctx.fillText(имяЗ + (этот?" ◀":""), 82, y)
        // Очки
        ctx.textAlign="right"; ctx.fillStyle = этот?"#ffffff":"#666"
        ctx.fillText(очки, 346, y)
      })
    }

    // Место игрока
    const моёМестоГлоб = топ.findIndex(з => {
      const имяЗ = typeof з === "object" ? з.name : ""
      return имяЗ === имяИгрока() && (typeof з === "object" ? з.score : з) === Math.round(счёт)
    })
    ctx.textAlign="center"; ctx.font="11px Arial"
    if (моёМестоГлоб >= 0) {
      const м = ["🥇 1st place!","🥈 2nd place!","🥉 3rd place!","4th place!","5th place!"][моёМестоГлоб]
      glow("#ffcc00",8); ctx.fillStyle="#ffcc00"; ctx.fillText(м, 200, 290); noGlow()
    } else if (топ.length > 0) {
      ctx.fillStyle="#444"; ctx.fillText("Not in top 5 yet — keep going!", 200, 290)
    }

    // ── Разделитель
    ctx.strokeStyle="#ffffff0a"; ctx.lineWidth=1
    ctx.beginPath(); ctx.moveTo(40,298); ctx.lineTo(360,298); ctx.stroke()

    // ── Блок: Достижения (y=308..325) — только иконки, компактно
    const моиДостижения = Object.entries(ДОСТИЖЕНИЯ_СПИСОК).filter(([ид]) => достижения[ид])
    if (моиДостижения.length > 0) {
      ctx.fillStyle="#333"; ctx.font="10px Arial"; ctx.textAlign="center"
      ctx.fillText("ACHIEVEMENTS", 200, 308)
      моиДостижения.slice(0,8).forEach(([,д],i) => {
        ctx.font="16px Arial"; ctx.fillText(д.иконка, 60+i*36, 326)
      })
    }

    // ── Разделитель
    ctx.strokeStyle="#ffffff0a"
    ctx.beginPath(); ctx.moveTo(40,334); ctx.lineTo(360,334); ctx.stroke()

    // ── Блок: Выбор галактики (y=344..390)
    ctx.textAlign="center"; ctx.fillStyle="#555"; ctx.font="10px Arial"
    ctx.fillText("CHOOSE GALAXY TO RESTART", 200, 346)

    const maxГал = Math.ceil(смертьМаксУровень / 5)
    const галЦвета = ["#00d4aa","#aa44ff","#ff6600","#ff0044","#ffcc00"]
    const галИконки = ["🌌","🌠","☄️","🔥","💀"]
    const колГал = Math.min(maxГал, 5)
    const кнШ = 46, кнГ = 34, отступ = (400 - колГал*кнШ - (колГал-1)*6) / 2
    for (let i = 0; i < колГал; i++) {
      const x = отступ + i*(кнШ+6), y = 354
      const цвет = галЦвета[i]
      const выбран = смертьВыбранныйУровень === i*5+1
      if (выбран) {
        glow(цвет,10); ctx.fillStyle=цвет+"33"
        ctx.beginPath(); ctx.roundRect(x,y,кнШ,кнГ,7); ctx.fill()
        ctx.strokeStyle=цвет; ctx.lineWidth=2
        ctx.beginPath(); ctx.roundRect(x,y,кнШ,кнГ,7); ctx.stroke(); noGlow()
      } else {
        ctx.strokeStyle=цвет+"44"; ctx.lineWidth=1
        ctx.beginPath(); ctx.roundRect(x,y,кнШ,кнГ,7); ctx.stroke()
      }
      ctx.font="13px Arial"; ctx.textAlign="center"
      ctx.fillText(галИконки[i], x+кнШ/2, y+13)
      ctx.fillStyle = выбран?цвет:цвет+"88"
      ctx.font = выбран?"bold 10px Arial":"9px Arial"
      ctx.fillText(`G${i+1}`, x+кнШ/2, y+27)
    }

    // ── Кнопки PLAY + SHOP (y=396..434)
    // PLAY
    glow("#00d4aa",10); ctx.fillStyle="#00d4aa22"
    ctx.beginPath(); ctx.roundRect(30,396,210,36,9); ctx.fill()
    ctx.strokeStyle="#00d4aa"; ctx.lineWidth=1.5
    ctx.beginPath(); ctx.roundRect(30,396,210,36,9); ctx.stroke(); noGlow()
    ctx.fillStyle="#00d4aa"; ctx.font="bold 15px Arial"; ctx.textAlign="center"
    ctx.fillText("▶ PLAY", 135, 419)
    // SHOP
    glow("#ffcc00",6)
    ctx.strokeStyle="#ffcc0055"; ctx.lineWidth=1.5
    ctx.beginPath(); ctx.roundRect(252,396,118,36,9); ctx.stroke(); noGlow()
    ctx.fillStyle="#ffcc00"; ctx.font="bold 13px Arial"
    ctx.fillText("🏪 SHOP", 311, 419)
  }

  requestAnimationFrame(игровойЦикл)
}

игровойЦикл()

// Кнопки перехода уровня (HTML поверх canvas) — вешаем здесь, после всех элементов
document.getElementById("lvlShopBtn").addEventListener("click", e => {
  e.stopPropagation(); e.preventDefault()
  window.открытьМагазин && window.открытьМагазин()
})
document.getElementById("lvlContinueBtn").addEventListener("click", e => {
  e.stopPropagation(); e.preventDefault()
  document.getElementById("shopBtnOverlay").style.display = "none"
  if (window._продолжитьУровень) window._продолжитьУровень()
})
</script>
</body>
</html>
