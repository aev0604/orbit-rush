name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Accept licenses & configure Android SDK
        run: |
          mkdir -p $HOME/.android
          echo "count=0" > $HOME/.android/repositories.cfg
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Init TWA
        run: |
          mkdir -p twa && cd twa
          echo "No" | bubblewrap init \
            --manifest "https://aev0604.github.io/orbit-rush/manifest.json" \
            --directory . \
            2>&1 || true
          ls -la

      - name: Build APK
        run: |
          cd twa
          echo "No" | bubblewrap build --skipSigning 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: orbit-rush-apk
          path: |
            twa/*.apk
            twa/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
