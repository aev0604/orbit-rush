name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          mkdir -p $HOME/.bubblewrap
          echo '{
            "jdkPath": "'"$JAVA_HOME"'",
            "androidSdkPath": "'"$ANDROID_HOME"'"
          }' > $HOME/.bubblewrap/config.json

      - name: Init TWA
        env:
          CI: "false"
        run: |
          mkdir -p twa
          printf 'aev0604.github.io\n/orbit-rush\nOrbit Rush\ncom.aev0604.orbitrush\n1\n0.0.1\n#06060f\n#06060f\n\n\nno\n' | \
          bubblewrap init \
            --manifest "https://aev0604.github.io/orbit-rush/manifest.json" \
            --directory twa
          ls -la twa/

      - name: Build APK
        run: |
          cd twa
          bubblewrap build --skipSigning

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: orbit-rush-apk
          path: |
            twa/*.apk
            twa/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
